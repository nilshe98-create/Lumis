<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMIS · 連結 LINE</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #00000A;
    color: #E8E4DC;
    font-family: 'Noto Sans TC', 'PingFang TC', sans-serif;
    text-align: center;
    padding: 24px;
  }
  .card { max-width: 360px; }
  .title { font-size: 1.05rem; letter-spacing: 5px; color: #C9A84C; margin-bottom: 28px; font-weight: 600; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(201,168,76,0.2);
    border-top-color: #C9A84C;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 22px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .msg { font-size: 0.95rem; line-height: 1.9; color: #C9C9D8; letter-spacing: 0.5px; }
  .icon { font-size: 2.4rem; margin-bottom: 14px; }
  .icon.gold { color: #C9A84C; }
  .err { color: #E08080; }
  .btn {
    display: inline-block;
    margin-top: 24px;
    padding: 12px 26px;
    background: #06C755;
    color: #fff;
    text-decoration: none;
    border-radius: 6px;
    font-size: 0.9rem;
    letter-spacing: 1px;
  }
  .btn.gold { background: transparent; border: 1px solid rgba(201,168,76,0.5); color: #C9A84C; }
</style>
</head>
<body>
  <div class="card">
    <div class="title">LUMIS</div>

    <!-- Loading: actively linking (only when a token is present and we're inside LINE) -->
    <div id="state-loading" style="display:none;">
      <div class="spinner"></div>
      <div class="msg">正在連結你的 LINE 帳號...</div>
    </div>

    <!-- Info: page opened directly / outside LINE / without a token. Calm, not an error. -->
    <div id="state-info">
      <div class="icon gold">✦</div>
      <div class="msg">
        請在 <b>LINE</b> 中開啟此頁面。<br><br>
        到 LUMIS 的訂閱成功畫面，點擊綠色的<br>「一鍵連結 LINE」按鈕即可自動完成。
      </div>
      <a class="btn gold" href="https://www.lumisstar.com">前往 LUMIS</a>
      <div id="debug-detail" style="margin-top:18px; font-size:0.7rem; color:#555; letter-spacing:0; word-break:break-all;"></div>
    </div>

    <!-- Success -->
    <div id="state-success" style="display:none;">
      <div class="icon gold">✦</div>
      <div class="msg">連結成功！🎉<br>明天早上 6 點開始，<br>你會收到專屬的星辰訊息。<br><br>你可以關閉這個頁面了。</div>
    </div>

    <!-- Error: a real failure during an actual linking attempt -->
    <div id="state-error" style="display:none;">
      <div class="icon err">⚠</div>
      <div class="msg err" id="error-text">連結失敗，請稍後再試。</div>
      <a class="btn" id="error-retry" href="javascript:void(0)" style="display:none;">重試</a>
    </div>
  </div>

<script>
const LIFF_ID = '2010456983-KoYPa3ey';

function show(state) {
  ['loading', 'info', 'success', 'error'].forEach(function (s) {
    var el = document.getElementById('state-' + s);
    if (el) el.style.display = (s === state) ? 'block' : 'none';
  });
}

function setError(text, allowRetry) {
  document.getElementById('error-text').textContent = text;
  var retry = document.getElementById('error-retry');
  if (allowRetry) {
    retry.style.display = 'inline-block';
    retry.onclick = function (e) { e.preventDefault(); main(); };
  } else {
    retry.style.display = 'none';
  }
  show('error');
}

async function main() {
  // CRITICAL ORDERING (per LINE's own docs): when opened via the LIFF magic link, the first
  // hop does NOT preserve our ?token=... as-is — LINE wraps it inside a `liff.state` param.
  // liff.init() is what unwraps that back into a normal ?token=... query param (sometimes via
  // an internal secondary redirect). So we must call liff.init() FIRST, and only read the
  // token from the URL AFTER that — checking before init() will always miss it.
  show('loading');

  let liffInitError = null;
  try {
    await liff.init({ liffId: LIFF_ID });
  } catch (err) {
    liffInitError = err;
  }

  // Re-read the URL now — if liff.state was present, it's been unwrapped by liff.init() above.
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  if (!token) {
    // Still no token even after LIFF init — genuinely opened directly (or in a preview),
    // not via the magic link. Calm "open in LINE" message rather than an error.
    if (liffInitError) {
      const debugEl = document.getElementById('debug-detail');
      if (debugEl) debugEl.textContent = 'Debug: liff.init failed — ' + (liffInitError.message || liffInitError.code || String(liffInitError));
    }
    show('info');
    return;
  }

  if (liffInitError) {
    const debugEl = document.getElementById('debug-detail');
    if (debugEl) debugEl.textContent = 'Debug: liff.init failed — ' + (liffInitError.message || liffInitError.code || String(liffInitError));
    show('info');
    return;
  }

  try {
    if (!liff.isLoggedIn()) {
      // Redirects through LINE login, then reloads this same URL (token stays in the query)
      liff.login({ redirectUri: window.location.href });
      return;
    }

    // Get the LINE user ID. Prefer liff.getProfile() (needs the 'profile' scope), but fall
    // back to the ID token's `sub` field (needs only 'openid', which is always granted) so this
    // works even if the 'profile' scope wasn't checked in the LIFF app settings.
    let lineUserId = null;
    try {
      const profile = await liff.getProfile();
      if (profile && profile.userId) lineUserId = profile.userId;
    } catch (e) { /* profile scope not granted — fall through to ID token */ }
    if (!lineUserId) {
      try {
        const idToken = liff.getDecodedIDToken();
        if (idToken && idToken.sub) lineUserId = idToken.sub;
      } catch (e) { /* no ID token available */ }
    }
    if (!lineUserId) {
      setError('無法取得 LINE 帳號資訊，請重試一次。', true);
      return;
    }

    const res = await fetch('/api/line-connect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'link', token: token, lineUserId: lineUserId })
    });
    const data = await res.json();

    if (data && data.ok) {
      show('success');
    } else {
      setError((data && data.error) || '連結失敗，請稍後再試。', true);
    }
  } catch (err) {
    setError('發生錯誤：' + (err.message || '請稍後再試。'), true);
  }
}

main();
</script>
</body>
</html>
